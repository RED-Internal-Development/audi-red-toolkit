feature_app:
  red_docs:
    base_path: "docs/feature_apps_v2/{app}"
    branch: "docs-sync/feature-apps"
  test_collection:
    unit_test:
      enabled: true
      collector: "jest"
      required: true
      status_key: "unitTest"
      source_fields:
        - "unit_test_coverage"
        - "unit_test_coverage_data"
    e2e_coverage:
      enabled: true
      collector: "cypress"
      required: false
      status_key: "e2eCoverage"
      source_fields:
        - "e2e_test_coverage"
        - "e2e_test_coverage_breakdown"
    lighthouse:
      enabled: true
      collector: "lighthouse"
      required: false
      status_key: "lighthouse"
      source_fields:
        - "lighthouse_score"
  msi:
    parent_page_id: "1838482057"
  vwgoa:
    parent_page_id: "2160066751"

