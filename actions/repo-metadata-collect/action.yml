name: Collect repository metadata for RED sync
description: Collects repository metadata, writes metadata-report.json, and exposes the report path for upload.
inputs:
  github_token:
    description: GitHub token used for querying repository metadata.
    required: true
  workflow_run_id:
    description: Workflow run id preserved for compatibility with existing callers.
    required: true
  repository:
    description: Repository slug in owner/name form.
    required: true
outputs:
  report_file:
    description: Absolute path to the generated metadata-report.json file.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: database
  color: blue